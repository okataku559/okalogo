<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おかログ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-white shadow-sm border-b px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
    <!-- ロゴクリックでHOME（初期状態）に戻る -->
    <div id="btn-home" class="flex items-center gap-2 cursor-pointer hover:opacity-80 transition-opacity">
      <i data-lucide="utensils" class="text-orange-500 w-7 h-7"></i>
      <h1 class="text-2xl font-bold text-gray-800 tracking-tight">おかログ</h1>
    </div>
    <div class="flex flex-wrap items-center gap-2 sm:gap-3 bg-gray-100 p-1.5 rounded-lg border">
      <span id="current-role-badge" class="text-sm font-bold px-3 py-1.5 rounded-md bg-gray-200 text-gray-600 whitespace-nowrap">閲覧モード</span>
      
      <!-- 管理者専用の隠しメニュー（データ読込・出力用） -->
      <div id="btn-import-container" class="hidden relative">
        <input type="file" id="csv-file-input" accept=".csv" class="hidden">
        <label for="csv-file-input" id="btn-import-label" class="cursor-pointer px-3 py-1.5 rounded-md text-sm font-bold transition-colors bg-blue-500 text-white shadow hover:bg-blue-600 flex items-center gap-1">
          <i data-lucide="upload" class="w-4 h-4"></i>読込
        </label>
      </div>

      <button id="btn-export-csv" class="hidden px-3 py-1.5 rounded-md text-sm font-bold transition-colors bg-green-500 text-white shadow hover:bg-green-600 flex items-center gap-1">
        <i data-lucide="download" class="w-4 h-4"></i>出力
      </button>

      <button id="btn-login-modal" class="px-3 py-1.5 rounded-md text-sm font-bold transition-colors bg-orange-500 text-white shadow hover:bg-orange-600">
        編集ログイン
      </button>
      <button id="btn-logout" class="hidden px-3 py-1.5 rounded-md text-sm font-bold transition-colors bg-gray-500 text-white shadow hover:bg-gray-600">
        ログアウト
      </button>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-col lg:flex-row max-w-screen-2xl w-full mx-auto p-4 gap-4">
    
    <!-- Left Column: Filters & List -->
    <div class="w-full lg:w-1/2 flex flex-col gap-4">
      
      <!-- Controls -->
      <div class="bg-white p-4 rounded-xl shadow-sm border flex flex-col gap-3">
        <!-- ★検索ボタンを明示的に追加 -->
        <div class="flex flex-col sm:flex-row gap-3 items-end">
          <div class="flex-1 w-full">
            <label class="block text-xs font-semibold text-gray-500 mb-1">都道府県</label>
            <select id="filter-pref" class="w-full border-gray-300 rounded-lg shadow-sm p-2 bg-gray-50 focus:ring-orange-500 focus:border-orange-500 outline-none border">
              <option value="">すべての都道府県</option>
            </select>
          </div>
          <div class="flex-1 w-full">
            <label class="block text-xs font-semibold text-gray-500 mb-1">エリア</label>
            <select id="filter-area" class="w-full border-gray-300 rounded-lg shadow-sm p-2 bg-gray-50 focus:ring-orange-500 focus:border-orange-500 outline-none border">
              <option value="">すべてのエリア</option>
            </select>
          </div>
          <div class="flex-1 w-full">
            <label class="block text-xs font-semibold text-gray-500 mb-1">ジャンル</label>
            <select id="filter-genre" class="w-full border-gray-300 rounded-lg shadow-sm p-2 bg-gray-50 focus:ring-orange-500 focus:border-orange-500 outline-none border">
              <option value="">すべてのジャンル</option>
            </select>
          </div>
          <div class="w-full sm:w-auto mt-2 sm:mt-0">
            <button id="btn-search" class="w-full sm:w-auto bg-orange-500 hover:bg-orange-600 text-white px-6 py-2 rounded-lg font-bold flex items-center justify-center gap-2 transition-colors h-[42px]">
              <i data-lucide="search" class="w-5 h-5"></i> 検索
            </button>
          </div>
        </div>
      </div>

      <!-- List -->
      <div class="bg-white rounded-xl shadow-sm border overflow-hidden flex-1 flex flex-col">
        <!-- ★ここに「お気に入り店舗の登録」ボタンを移動し、テキストを変更しました -->
        <div class="p-4 border-b bg-gray-50/50 flex flex-wrap justify-between items-center gap-2">
          <div class="flex items-baseline gap-2">
            <h2 class="font-bold text-gray-700">登録店舗 (<span id="list-count">0</span>件)</h2>
            <span class="text-xs text-gray-500 hidden sm:inline">リストを押すと地図が移動します</span>
          </div>
          <button id="btn-add" class="hidden px-3 py-1.5 rounded-md text-sm font-bold transition-colors bg-gray-800 text-white shadow hover:bg-gray-900 flex items-center gap-1">
            <i data-lucide="plus" class="w-4 h-4"></i>お気に入り店舗の登録
          </button>
        </div>
        <div class="overflow-y-auto max-h-[500px] lg:max-h-[calc(100vh-250px)] p-2">
          <div id="restaurant-list" class="flex flex-col gap-2">
            <!-- 読み込み中表示 -->
            <div class="text-center text-gray-400 py-10">読み込み中...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Column: Map & Details -->
    <div class="w-full lg:w-1/2 flex flex-col gap-4">
      <div class="bg-white rounded-xl shadow-sm border overflow-hidden flex-1 min-h-[400px] lg:min-h-0 flex flex-col relative">
        <!-- Map Iframe -->
        <div class="flex-1 bg-gray-200 relative">
          <iframe id="map-frame" title="Google Maps" width="100%" height="100%" style="border: 0;" loading="lazy" allowfullscreen src="https://maps.google.com/maps?q=大阪&t=&z=11&ie=UTF8&iwloc=&output=embed"></iframe>
        </div>
        <!-- Address Details -->
        <div class="bg-white p-4 border-t flex items-start gap-3">
          <i data-lucide="map-pin" class="text-orange-500 mt-1 flex-shrink-0 w-6 h-6"></i>
          <div id="map-details" class="flex-1">
            <div class="text-gray-500 text-sm mt-1">リストからお店を選択すると、ここに詳細な地図が表示されます。</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Login Modal (合言葉入力画面) -->
  <div id="login-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden flex flex-col">
      <div class="px-6 py-4 border-b flex justify-between items-center bg-gray-50">
        <h2 class="font-bold text-lg text-gray-800">権限の切り替え</h2>
        <button id="btn-close-login" class="text-gray-500 hover:bg-gray-200 p-1 rounded-full transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="p-6 flex flex-col gap-4">
        <p class="text-sm text-gray-600">
          お店の追加や編集を行うには、管理者から教えられた「合言葉」を入力してください。
        </p>
        <div class="relative">
          <input type="password" id="password-input" class="w-full border-gray-300 rounded-md shadow-sm p-2 pr-10 bg-gray-50 focus:ring-2 focus:ring-orange-500 border outline-none" placeholder="合言葉を入力">
          <!-- 目玉アイコン -->
          <button type="button" id="btn-toggle-password" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-gray-700 transition-colors">
            <i data-lucide="eye" id="password-eye-icon" class="w-5 h-5"></i>
          </button>
          <p id="login-error" class="text-red-500 text-xs mt-1 hidden">合言葉が間違っています。</p>
        </div>
        <button id="btn-submit-login" class="w-full bg-orange-500 text-white font-bold py-2 rounded-md hover:bg-orange-600 transition-colors">
          ログイン
        </button>
        <hr class="my-2 border-gray-200">
        <a href="#" id="btn-request-mail" class="text-center text-sm text-blue-600 hover:underline flex items-center justify-center gap-1">
          <i data-lucide="mail" class="w-4 h-4"></i> 管理者に合言葉をリクエストする
        </a>
      </div>
    </div>
  </div>

  <!-- Form Modal (お店追加・編集画面) -->
  <div id="form-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
      <div class="px-6 py-4 border-b flex justify-between items-center bg-gray-50">
        <h2 id="form-title" class="font-bold text-lg text-gray-800">お店情報の編集</h2>
        <button id="btn-close-modal" class="text-gray-500 hover:bg-gray-200 p-1 rounded-full transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="p-6 overflow-y-auto flex-1">
        <form id="restaurant-form" class="flex flex-col gap-4">
          <input type="hidden" id="form-id">
          
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">店名 <span class="text-red-500">*</span></label>
            <input required type="text" id="form-name" class="w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50 focus:ring-2 focus:ring-orange-500 border outline-none" placeholder="例: カフェ・〇〇">
          </div>
          
          <div class="flex gap-4">
            <div class="flex-1">
              <label class="block text-sm font-medium text-gray-700 mb-1">ジャンル <span class="text-red-500">*</span></label>
              <!-- 大手グルメサイト基準の20ジャンル -->
              <select required id="form-genre" class="w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50 focus:ring-2 focus:ring-orange-500 border outline-none">
                <option value="">選択してください</option>
                <option value="和食・日本料理">和食・日本料理</option>
                <option value="寿司・海鮮">寿司・海鮮</option>
                <option value="焼き鳥・鳥料理">焼き鳥・鳥料理</option>
                <option value="鍋（しゃぶしゃぶ・もつ鍋等）">鍋（しゃぶしゃぶ・もつ鍋等）</option>
                <option value="イタリアン・フレンチ">イタリアン・フレンチ</option>
                <option value="洋食・西洋料理">洋食・西洋料理</option>
                <option value="中華料理">中華料理</option>
                <option value="焼肉・ホルモン">焼肉・ホルモン</option>
                <option value="韓国料理">韓国料理</option>
                <option value="アジア・エスニック">アジア・エスニック</option>
                <option value="ラーメン">ラーメン</option>
                <option value="うどん">うどん</option>
                <option value="そば">そば</option>
                <option value="お好み焼き・粉もん">お好み焼き・粉もん</option>
                <option value="カレー">カレー</option>
                <option value="居酒屋・ダイニングバー">居酒屋・ダイニングバー</option>
                <option value="バー・お酒">バー・お酒</option>
                <option value="カフェ・スイーツ">カフェ・スイーツ</option>
                <option value="パン・ハンバーガー">パン・ハンバーガー</option>
                <option value="その他">その他</option>
              </select>
            </div>
            <div class="flex-1">
              <label class="block text-sm font-medium text-gray-700 mb-1">エリア (自動反映)</label>
              <input type="text" id="form-area" readonly class="w-full border-gray-200 rounded-md shadow-sm p-2 bg-gray-100 text-gray-500 border outline-none cursor-not-allowed" placeholder="住所を入れると反映されます">
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">住所 <span class="text-red-500">*</span></label>
            <input required type="text" id="form-address" class="w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50 focus:ring-2 focus:ring-orange-500 border outline-none" placeholder="例: 大阪府大阪市北区...">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">URL (食べログや公式サイト)</label>
            <input type="url" id="form-url" class="w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50 focus:ring-2 focus:ring-orange-500 border outline-none" placeholder="https://...">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">満足度</label>
            <div class="flex gap-2 items-center">
              <div id="form-taste-container" class="flex gap-1">
                <button type="button" data-val="1" class="taste-star text-gray-300 hover:scale-110 transition-transform"><i data-lucide="star" class="w-8 h-8 pointer-events-none fill-current"></i></button>
                <button type="button" data-val="2" class="taste-star text-gray-300 hover:scale-110 transition-transform"><i data-lucide="star" class="w-8 h-8 pointer-events-none fill-current"></i></button>
                <button type="button" data-val="3" class="taste-star text-gray-300 hover:scale-110 transition-transform"><i data-lucide="star" class="w-8 h-8 pointer-events-none fill-current"></i></button>
                <button type="button" data-val="4" class="taste-star text-gray-300 hover:scale-110 transition-transform"><i data-lucide="star" class="w-8 h-8 pointer-events-none fill-current"></i></button>
                <button type="button" data-val="5" class="taste-star text-gray-300 hover:scale-110 transition-transform"><i data-lucide="star" class="w-8 h-8 pointer-events-none fill-current"></i></button>
              </div>
              <span id="taste-label" class="ml-2 text-sm text-gray-500 font-medium">未評価</span>
            </div>
            <input type="hidden" id="form-taste" value="0">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">おすすめのシーン（複数選択可）</label>
            <div class="flex flex-wrap gap-3">
              <label class="flex items-center gap-2 cursor-pointer bg-white border border-gray-300 px-3 py-2 rounded-md hover:bg-orange-50 transition-colors"><input type="checkbox" value="一人で" class="scene-cb w-4 h-4 text-orange-500 rounded border-gray-300 focus:ring-orange-500"> <span class="text-sm font-medium text-gray-700">一人で</span></label>
              <label class="flex items-center gap-2 cursor-pointer bg-white border border-gray-300 px-3 py-2 rounded-md hover:bg-orange-50 transition-colors"><input type="checkbox" value="デート" class="scene-cb w-4 h-4 text-orange-500 rounded border-gray-300 focus:ring-orange-500"> <span class="text-sm font-medium text-gray-700">デート</span></label>
              <label class="flex items-center gap-2 cursor-pointer bg-white border border-gray-300 px-3 py-2 rounded-md hover:bg-orange-50 transition-colors"><input type="checkbox" value="接待" class="scene-cb w-4 h-4 text-orange-500 rounded border-gray-300 focus:ring-orange-500"> <span class="text-sm font-medium text-gray-700">接待</span></label>
              <label class="flex items-center gap-2 cursor-pointer bg-white border border-gray-300 px-3 py-2 rounded-md hover:bg-orange-50 transition-colors"><input type="checkbox" value="大人数" class="scene-cb w-4 h-4 text-orange-500 rounded border-gray-300 focus:ring-orange-500"> <span class="text-sm font-medium text-gray-700">大人数</span></label>
              <label class="flex items-center gap-2 cursor-pointer bg-white border border-gray-300 px-3 py-2 rounded-md hover:bg-orange-50 transition-colors"><input type="checkbox" value="家族（子供と）" class="scene-cb w-4 h-4 text-orange-500 rounded border-gray-300 focus:ring-orange-500"> <span class="text-sm font-medium text-gray-700">家族（子供と）</span></label>
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">特徴・メモ</label>
            <textarea id="form-features" rows="3" class="w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50 focus:ring-2 focus:ring-orange-500 border outline-none" placeholder="おしゃれ、落ち着く、など"></textarea>
          </div>

          <div class="mt-4 flex gap-3 justify-end pt-4 border-t border-gray-100">
            <button type="button" id="btn-cancel" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 font-medium transition-colors">キャンセル</button>
            <button type="submit" class="px-6 py-2 bg-gray-800 text-white rounded-md hover:bg-gray-900 font-medium transition-colors shadow-sm">保存する</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- あなた専用の Firebase Config ---
    const firebaseConfig = {
      apiKey: "AIzaSyDCdW8mIOizhKt2FKf4vuyOZhRXIQxdmKc",
      authDomain: "okalogo-40bee.firebaseapp.com",
      projectId: "okalogo-40bee",
      storageBucket: "okalogo-40bee.firebasestorage.app",
      messagingSenderId: "38506015761",
      appId: "1:38506015761:web:2a2c16fab2e2ad913415b0",
      measurementId: "G-R130SM1LN5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- 権限管理 (難読化済みパスワード) ---
    const KEY_A = "b2thdGFrdTE5ODQ="; // 管理者: okataku1984
    const KEY_E = "b2thdGFrdUZyaWVuZA=="; // 編集者: okatakuFriend
    
    let currentRole = localStorage.getItem('okalogo_role') || 'viewer';

    // --- State ---
    let restaurants = [];
    let activeRestaurantId = null;
    let selectedPref = '';
    let selectedArea = '';
    let selectedGenre = '';

    lucide.createIcons();

    // --- DOM Elements ---
    const listEl = document.getElementById('restaurant-list');
    const filterPrefEl = document.getElementById('filter-pref');
    const filterAreaEl = document.getElementById('filter-area');
    const filterGenreEl = document.getElementById('filter-genre');
    const listCountEl = document.getElementById('list-count');
    const mapFrame = document.getElementById('map-frame');
    const mapDetails = document.getElementById('map-details');
    const modal = document.getElementById('form-modal');
    const form = document.getElementById('restaurant-form');
    
    // Login Elements
    const loginModal = document.getElementById('login-modal');
    const roleBadge = document.getElementById('current-role-badge');
    const btnLoginModal = document.getElementById('btn-login-modal');
    const btnLogout = document.getElementById('btn-logout');
    const btnAdd = document.getElementById('btn-add'); // ヘッダーに移動した追加ボタン
    const btnExportCsv = document.getElementById('btn-export-csv');
    const btnImportContainer = document.getElementById('btn-import-container');
    const fileInput = document.getElementById('csv-file-input');
    const importLabel = document.getElementById('btn-import-label');

    // ★ブラウザバック対策：検索状態を記憶・復元する仕組み
    function saveState() {
      const state = { pref: selectedPref, area: selectedArea, genre: selectedGenre, activeId: activeRestaurantId };
      sessionStorage.setItem('okalogo_state', JSON.stringify(state));
    }
    function loadState() {
      const saved = sessionStorage.getItem('okalogo_state');
      if (saved) {
        try {
          const state = JSON.parse(saved);
          selectedPref = state.pref || '';
          selectedArea = state.area || '';
          selectedGenre = state.genre || '';
          activeRestaurantId = state.activeId || null;
        } catch(e) {}
      }
    }

    // --- Authentication & Data Fetching ---
    const initAuth = async () => {
      try {
        await signInAnonymously(auth);
      } catch (error) {
        console.error("Auth Error:", error);
      }
    };
    initAuth();

    onAuthStateChanged(auth, (user) => {
      if (!user) return;
      const collRef = collection(db, 'restaurants');
      
      onSnapshot(collRef, (snapshot) => {
        if (!snapshot.empty) {
          restaurants = snapshot.docs.map(doc => {
            const data = doc.data();
            let cleanArea = '';
            if (data.address) {
              cleanArea = extractAreaFromAddress(data.address);
            } else {
              cleanArea = data.area || '';
            }
            cleanArea = cleanArea.replace(/^(北海道|東京都|(?:京都|大阪)府|.{2,3}県)/, '');
            return { id: doc.id, pref: extractPrefecture(data.address || data.area), normalizedArea: cleanArea, ...data };
          });

          // 初期ロード時に一度だけ記憶を復元
          if (!window.isStateLoaded) {
            loadState();
            window.isStateLoaded = true;
            window.isStateLoadedFirstTime = true; // スクロール用フラグ
            
            // プルダウンの見た目を復元
            filterPrefEl.value = selectedPref;
            // AreaとGenreはupdateFiltersOptions内でセットされる
          }
          
          updateFiltersOptions();
          updateUIByRole();
          renderList();
          updateMap();
        }
      }, (error) => {
        console.error("Firestore Error:", error);
      });
    });

    // --- Core Functions ---
    function extractPrefecture(text) {
      if (!text) return '';
      const match = text.match(/(北海道|東京都|(?:京都|大阪)府|.{2,3}県)/);
      if (match) return match[0];
      if (text.includes('大阪') || text.includes('堺市') || text.includes('池田市') || text.includes('豊中市') || text.includes('守口市') || text.includes('羽曳野市') || text.includes('大東市') || text.includes('泉佐野市') || text.includes('河内長野市')) return '大阪府';
      if (text.includes('兵庫') || text.includes('神戸市') || text.includes('西宮市') || text.includes('尼崎市') || text.includes('宝塚市') || text.includes('姫路市') || text.includes('伊丹市') || text.includes('三田市') || text.includes('加東市') || text.includes('丹波市') || text.includes('丹波篠山市')) return '兵庫県';
      if (text.includes('京都') || text.includes('宇治市') || text.includes('城陽市') || text.includes('福知山市')) return '京都府';
      if (text.includes('和歌山') || text.includes('紀の川市') || text.includes('東牟婁郡') || text.includes('有田郡')) return '和歌山県';
      return 'その他';
    }

    function extractAreaFromAddress(address) {
      if (!address) return '';
      if (address.includes('大阪府大阪市') || address.includes('大阪市')) {
        let prefix = address.includes('大阪府') ? '大阪府大阪市' : '大阪市';
        if (address.includes('北区') || address.includes('福島区')) return `${prefix}(キタ・福島)`;
        if (address.includes('中央区')) {
          if (address.match(/難波|心斎橋|道頓堀|千日前|日本橋|宗右衛門町|谷町|南船場|東心斎橋|西心斎橋/)) return `${prefix}(ミナミ周辺)`;
          if (address.match(/本町|北浜|淀屋橋|平野町|淡路町|瓦町|備後町|安土町|高麗橋|伏見町|道修町|今橋/)) return `${prefix}(本町・淀屋橋)`;
          return `${prefix}(中央区・その他)`;
        }
        if (address.includes('浪速区')) return `${prefix}(ミナミ周辺)`;
        if (address.includes('天王寺区') || address.includes('阿倍野区')) return `${prefix}(天王寺・阿倍野)`;
        if (address.includes('淀川区')) return `${prefix}(新大阪・十三)`;
        if (address.includes('都島区') || address.includes('城東区')) return `${prefix}(京橋・OBP)`;
        if (address.includes('西区')) return `${prefix}(西区・新町・堀江)`;
        if (address.includes('大正区') || address.includes('港区') || address.includes('此花区') || address.includes('住之江区')) return `${prefix}(ベイエリア)`;
        const wardMatch = address.match(/大阪市(.+?区)/);
        if (wardMatch) return `${prefix}(${wardMatch[1]})`;
        return prefix;
      }
      const match = address.match(/^(.{2,3}?[都道府県])?(.+?[市区町村])/);
      if (match) return (match[1] || '') + match[2]; 
      const spaceIndex = address.search(/[\s　]/);
      return spaceIndex > -1 ? address.substring(0, spaceIndex) : address;
    }

    function parseCSV(text) {
      const result = [];
      let row = [];
      let inQuotes = false;
      let currentVal = '';
      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        if (inQuotes) {
          if (char === '"') {
            if (i + 1 < text.length && text[i + 1] === '"') {
              currentVal += '"'; 
              i++;
            } else {
              inQuotes = false;
            }
          } else {
            currentVal += char;
          }
        } else {
          if (char === '"') {
            inQuotes = true;
          } else if (char === ',') {
            row.push(currentVal);
            currentVal = '';
          } else if (char === '\n' || char === '\r') {
            row.push(currentVal);
            currentVal = '';
            result.push(row);
            row = [];
            if (char === '\r' && i + 1 < text.length && text[i + 1] === '\n') {
              i++; 
            }
          } else {
            currentVal += char;
          }
        }
      }
      if (currentVal || row.length > 0) {
        row.push(currentVal);
        result.push(row);
      }
      return result;
    }

      updateFiltersOptions(); 
    });
    
    // ★「検索」ボタンを押した時に、選んだ条件を適用してリストを更新する
    document.getElementById('btn-search').addEventListener('click', () => {
      selectedPref = filterPrefEl.value;
      selectedArea = filterAreaEl.value;
      selectedGenre = filterGenreEl.value;
      activeRestaurantId = null; // 検索時は選択状態をリセット
      
      saveState(); // 検索条件を記憶
      renderList();
      updateMap();
    });
    
    btnAdd.addEventListener('click', () => openModal());
    document.getElementById('btn-close-modal').addEventListener('click', closeModal);
    document.getElementById('btn-cancel').addEventListener('click', closeModal);

    document.querySelectorAll('.scene-cb').forEach(cb => {
      cb.addEventListener('change', (e) => {
        if(e.target.checked) {
           e.target.parentElement.classList.add('bg-orange-50', 'border-orange-500');
           e.target.parentElement.classList.remove('bg-white', 'border-gray-300');
        } else {
           e.target.parentElement.classList.remove('bg-orange-50', 'border-orange-500');
           e.target.parentElement.classList.add('bg-white', 'border-gray-300');
        }
      });
    });

    listEl.addEventListener('click', async (e) => {
      const card = e.target.closest('.restaurant-card');
      if (!card) return;
      const id = card.dataset.id;
      const restaurant = restaurants.find(r => r.id === id);

      if (e.target.closest('.btn-edit')) {
        e.stopPropagation();
        openModal(restaurant);
      } else if (e.target.closest('.btn-delete')) {
        e.stopPropagation();
        if(confirm('本当に削除しますか？')) {
          await deleteDoc(doc(db, 'restaurants', id));
          if(activeRestaurantId === id) { activeRestaurantId = null; updateMap(); saveState(); }
        }
      } else if (e.target.closest('.btn-request-delete')) {
        e.stopPropagation();
        if(confirm('管理者に削除を依頼しますか？')) {
          await updateDoc(doc(db, 'restaurants', id), { deleteRequested: true });
        }
      } else if (e.target.closest('.btn-cancel-request')) {
        e.stopPropagation();
        await updateDoc(doc(db, 'restaurants', id), { deleteRequested: false });
      } else {
        activeRestaurantId = id;
        saveState(); // 選んだお店を記憶
        renderList();
        updateMap();
        
        // スマホなどの小さい画面では、リストを選ぶと地図まで自動スクロール
        if(window.innerWidth < 1024) {
          document.getElementById('map-frame').parentElement.scrollIntoView({ behavior: 'smooth' });
        }
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const sceneCbs = document.querySelectorAll('.scene-cb:checked');
      const scenes = Array.from(sceneCbs).map(cb => cb.value);

      const id = document.getElementById('form-id').value || crypto.randomUUID();
      const payload = {
        id,
        name: document.getElementById('form-name').value,
        genre: document.getElementById('form-genre').value,
        area: document.getElementById('form-area').value,
        address: document.getElementById('form-address').value,
        url: document.getElementById('form-url').value,
        features: document.getElementById('form-features').value,
        taste: document.getElementById('form-taste').value,
        scenes: scenes,
        updatedAt: new Date().toISOString()
      };
      
      await setDoc(doc(db, 'restaurants', id), payload, { merge: true });
      closeModal();
    });

  </script>
</body>
</html>
