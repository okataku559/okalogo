  </header>

          <select id="filter-area" class="w-full border-gray-300 rounded-lg shadow-sm p-2 bg-gray-50 focus:ring-orange-500 focus:border-orange-500 outline-none border">
            <option value="">すべてのエリア</option>
          </select>
        </div>
        <div class="flex-1">
          <label class="block text-xs font-semibold text-gray-500 mb-1">ジャンル</label>
          <select id="filter-genre" class="w-full border-gray-300 rounded-lg shadow-sm p-2 bg-gray-50 focus:ring-orange-500 focus:border-orange-500 outline-none border">
            <option value="">すべてのジャンル</option>

        <div class="flex items-end">

            <i data-lucide="plus" class="w-5 h-5"></i> お店を追加

      { id: '47', name: '上海', genre: '洋食・中華系', url: 'http://www.nau-now.com/shanghai/', area: '大阪府大阪市', address: '大阪府大阪市大正区千島１-１８-１２ ', features: '', taste: '5' },
      { id: '48', name: 'キングスポート', genre: '洋食・中華系', url: 'https://tabelog.com/osaka/A2707/A270703/27037869/', area: '大阪府東大阪市', address: '大阪府東大阪市新家2-1-41', features: '量がめちゃめちゃ多い、コスパ良い', taste: '3' },
      { id: '49', name: 'やろく レストラン本店', genre: '洋食・中華系', url: 'https://tabelog.com/osaka/A2701/A270404/27002854/', area: '大阪府大阪市', address: '大阪府大阪市住吉区東粉浜3-30-16', features: 'たまごコロッケ、ポテトサラダがじゃがいもの味が優しい', taste: '4' },
      { id: '50', name: 'グラタンのお店 どつぼどーる ', genre: '洋食・中華系', url: 'https://tabelog.com/hyogo/A2803/A280303/28004183/', area: '兵庫県宝塚市', address: '兵庫県宝塚市逆瀬川1-13-27 トヨタビル 1F', features: '列車でグラタン届く、美味しい、芦屋にも店舗あり', taste: '4' },
      { id: '51', name: 'タカムラ ワイン＆コーヒーロースターズ', genre: 'カフェ・軽食', url: 'https://takamuranet.com/', area: '大阪府大阪市', address: '大阪府大阪市西区江戸堀2丁目2-18', features: 'コーヒー豆の個性を引き出すことを最優先し、最新鋭の焙煎機を使用', taste: '' },
      { id: '52', name: 'ENnoMADO/草樹庵', genre: 'カフェ・軽食', url: 'https://maps.app.goo.gl/CV3BMg2qsbL9bf126?g_st=com.google.maps.preview.copy', area: '大阪府枚方市', address: '大阪府枚方市茄子作北町３６−１１', features: '古民家、おしゃれ', taste: '' },
      { id: '53', name: '讃岐うどん 白庵', genre: '麺類', url: 'https://tabelog.com/osaka/A2701/A270302/27014852/', area: '大阪府大阪市', address: '大阪府大阪市淀川区新高6-12-7 三和マンション 1F', features: '', taste: '' }
    ];

    lucide.createIcons();

    // --- DOM Elements ---
    const listEl = document.getElementById('restaurant-list');
    const filterAreaEl = document.getElementById('filter-area');
    const filterGenreEl = document.getElementById('filter-genre');
    const listCountEl = document.getElementById('list-count');
    const mapFrame = document.getElementById('map-frame');
    const mapDetails = document.getElementById('map-details');
    const modal = document.getElementById('form-modal');
    const form = document.getElementById('restaurant-form');

    // --- Authentication & Data Fetching ---
    const initAuth = async () => {
      try {
        await signInAnonymously(auth);
      } catch (error) {
        console.error("Auth Error:", error);
      }
    };
    initAuth();

    onAuthStateChanged(auth, (user) => {
      if (!user) return;
      // 今回はあなた専用のFirebaseに繋ぐため、シンプルなパスに変更します
      const collRef = collection(db, 'restaurants');
      
      onSnapshot(collRef, (snapshot) => {
        if (snapshot.empty && restaurants.length === 0) {
          // Firebaseが空っぽの場合、CSVのデータを自動で流し込みます
          INITIAL_DATA.forEach(async (item) => {
            await setDoc(doc(collRef, item.id), item);
          });
        } else {
          restaurants = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          updateFiltersOptions();
          renderList();
        }
      }, (error) => {
        console.error("Firestore Error:", error);
      });
    });

    // --- Core Functions ---
    function updateFiltersOptions() {
      const areas = [...new Set(restaurants.map(r => r.area).filter(Boolean))].sort();
      const genres = [...new Set(restaurants.map(r => r.genre).filter(Boolean))].sort();
      
      filterAreaEl.innerHTML = '<option value="">すべてのエリア</option>' + areas.map(a => `<option value="${a}" ${a === selectedArea ? 'selected' : ''}>${a}</option>`).join('');
      filterGenreEl.innerHTML = '<option value="">すべてのジャンル</option>' + genres.map(g => `<option value="${g}" ${g === selectedGenre ? 'selected' : ''}>${g}</option>`).join('');
    }

    function renderList() {
      const filtered = restaurants.filter(r => {
        const matchArea = selectedArea ? r.area === selectedArea : true;
        const matchGenre = selectedGenre ? r.genre === selectedGenre : true;
        return matchArea && matchGenre;
      });

      listCountEl.textContent = filtered.length;

      if (filtered.length === 0) {
        listEl.innerHTML = `
          <div class="text-center text-gray-400 py-10">
            <i data-lucide="search" class="mx-auto mb-2 opacity-50 w-8 h-8"></i>
            条件に合うお店がありません
          </div>`;
      } else {
        listEl.innerHTML = filtered.map(r => {
          const isActive = activeRestaurantId === r.id;
          const bgClass = isActive ? 'border-orange-500 bg-orange-50/50 ring-1 ring-orange-500' : 'border-gray-200 hover:border-orange-300 hover:bg-orange-50/20';
          
          let actionButtons = '';
          if (isActive) {
            let adminOrEditorBtns = '';
            if (isAdmin) {
              const deleteBtnText = r.deleteRequested ? '削除を承認' : '削除';
              adminOrEditorBtns += `<button class="btn-delete text-sm text-white bg-red-500 hover:bg-red-600 px-3 py-1.5 rounded-md flex items-center gap-1 shadow-sm"><i data-lucide="trash-2" class="w-4 h-4"></i> ${deleteBtnText}</button>`;
              if (r.deleteRequested) {
                adminOrEditorBtns += `<button class="btn-cancel-request text-sm text-gray-600 bg-white border border-gray-300 hover:bg-gray-50 px-3 py-1.5 rounded-md flex items-center gap-1 shadow-sm">依頼取消</button>`;
              }
            } else {
              if (!r.deleteRequested) {
                adminOrEditorBtns += `<button class="btn-request-delete text-sm text-red-600 bg-red-50 hover:bg-red-100 border border-red-200 px-3 py-1.5 rounded-md flex items-center gap-1 shadow-sm"><i data-lucide="alert-circle" class="w-4 h-4"></i> 削除を依頼</button>`;
              } else {
                adminOrEditorBtns += `<span class="text-sm text-gray-500 px-2 py-1.5 flex items-center gap-1"><i data-lucide="check-circle" class="text-green-500 w-4 h-4"></i> 依頼済</span>`;
              }
            }

            actionButtons = `
              <div class="mt-4 pt-3 border-t border-orange-200/50 flex flex-wrap gap-2 justify-end">
                <button class="btn-edit text-sm text-gray-600 bg-white border border-gray-300 hover:bg-gray-50 px-3 py-1.5 rounded-md flex items-center gap-1 shadow-sm"><i data-lucide="edit-2" class="w-4 h-4"></i> 編集</button>
                ${adminOrEditorBtns}
              </div>
            `;
          }

          let deleteBadge = r.deleteRequested ? `<span class="bg-red-100 text-red-700 text-xs px-2 py-1 rounded-full font-bold flex items-center gap-1 border border-red-200"><i data-lucide="alert-circle" class="w-3 h-3"></i> 削除依頼あり</span>` : '';

          return `
            <div class="restaurant-card p-4 rounded-lg border cursor-pointer transition-all ${bgClass}" data-id="${r.id}">
              <div class="flex justify-between items-start gap-2">
                <h3 class="font-bold text-lg text-gray-800 leading-tight">${r.name}</h3>
                <div class="flex items-center gap-1">${deleteBadge}</div>
              </div>
              <div class="flex flex-wrap gap-2 mt-2">
                ${r.genre ? `<span class="bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded-md">${r.genre}</span>` : ''}
                ${r.area ? `<span class="bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded-md">${r.area}</span>` : ''}
                ${r.taste ? `<span class="bg-yellow-100 text-yellow-800 text-xs px-2 py-1 rounded-md font-medium">評価: ${r.taste}</span>` : ''}
              </div>
              ${r.features ? `<p class="text-sm text-gray-600 mt-3 bg-gray-50 p-2 rounded border border-gray-100">${r.features}</p>` : ''}
              ${actionButtons}
            </div>
          `;
        }).join('');
      }
      lucide.createIcons();
    }

    function updateMap() {
      const activeRestaurant = restaurants.find(r => r.id === activeRestaurantId);
      const query = activeRestaurant ? activeRestaurant.address : (selectedArea || '大阪');
      const zoom = activeRestaurant ? 16 : 11;
      
      mapFrame.src = `https://maps.google.com/maps?q=${encodeURIComponent(query)}&t=&z=${zoom}&ie=UTF8&iwloc=&output=embed`;

      if (activeRestaurant) {
        let externalLink = activeRestaurant.url ? `<a href="${activeRestaurant.url}" target="_blank" class="text-blue-600 hover:text-blue-800 text-sm font-medium flex items-center gap-1"><i data-lucide="external-link" class="w-4 h-4"></i> URLを開く</a>` : '';
        mapDetails.innerHTML = `
          <h4 class="font-bold text-gray-800">${activeRestaurant.name}</h4>
          <p class="text-gray-600 text-sm">${activeRestaurant.address}</p>
          <div class="mt-2 flex gap-3">
            <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(activeRestaurant.address)}" target="_blank" class="text-orange-600 hover:text-orange-800 text-sm font-medium flex items-center gap-1">
              <i data-lucide="external-link" class="w-4 h-4"></i> Google Mapで開く
            </a>
            ${externalLink}
          </div>
        `;
      } else {
        mapDetails.innerHTML = `<div class="text-gray-500 text-sm mt-1">${selectedArea ? selectedArea + ' の地図を表示中' : 'リストからお店を選択すると、ここに詳細な地図が表示されます。'}</div>`;
      }
      lucide.createIcons();
    }

    // --- Modal Logic ---
    function openModal(data = null) {
      document.getElementById('form-title').textContent = data ? 'お店情報の編集' : '新しいお店の追加';
      document.getElementById('form-id').value = data?.id || '';
      document.getElementById('form-name').value = data?.name || '';
      document.getElementById('form-genre').value = data?.genre || '';
      document.getElementById('form-area').value = data?.area || '';
      document.getElementById('form-address').value = data?.address || '';
      document.getElementById('form-url').value = data?.url || '';
      document.getElementById('form-features').value = data?.features || '';
      document.getElementById('form-taste').value = data?.taste || '';
      modal.classList.remove('hidden');
    }

    function closeModal() {
      modal.classList.add('hidden');
      form.reset();
    }

    // --- Event Listeners ---
    filterAreaEl.addEventListener('change', (e) => { selectedArea = e.target.value; activeRestaurantId = null; renderList(); updateMap(); });
    filterGenreEl.addEventListener('change', (e) => { selectedGenre = e.target.value; activeRestaurantId = null; renderList(); updateMap(); });
    
    document.getElementById('btn-add').addEventListener('click', () => openModal());
    document.getElementById('btn-close-modal').addEventListener('click', closeModal);
    document.getElementById('btn-cancel').addEventListener('click', closeModal);

    // List Click Delegation
    listEl.addEventListener('click', async (e) => {
      const card = e.target.closest('.restaurant-card');
      if (!card) return;
      const id = card.dataset.id;
      const restaurant = restaurants.find(r => r.id === id);

      if (e.target.closest('.btn-edit')) {
        e.stopPropagation();
        openModal(restaurant);
      } else if (e.target.closest('.btn-delete')) {
        e.stopPropagation();
        if(confirm('本当に削除しますか？')) {
          await deleteDoc(doc(db, 'restaurants', id));
          if(activeRestaurantId === id) { activeRestaurantId = null; updateMap(); }
        }
      } else if (e.target.closest('.btn-request-delete')) {
        e.stopPropagation();
        if(confirm('管理者に削除を依頼しますか？')) {
          await updateDoc(doc(db, 'restaurants', id), { deleteRequested: true });
        }
      } else if (e.target.closest('.btn-cancel-request')) {
        e.stopPropagation();
        await updateDoc(doc(db, 'restaurants', id), { deleteRequested: false });
      } else {
        activeRestaurantId = id;
        renderList();
        updateMap();
      }
    });

    // Form Submit
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('form-id').value || crypto.randomUUID();
      const payload = {
        id,
        name: document.getElementById('form-name').value,
        genre: document.getElementById('form-genre').value,
        area: document.getElementById('form-area').value,
        address: document.getElementById('form-address').value,
        url: document.getElementById('form-url').value,
        features: document.getElementById('form-features').value,
        taste: document.getElementById('form-taste').value,
        updatedAt: new Date().toISOString()
      };
      
      await setDoc(doc(db, 'restaurants', id), payload, { merge: true });
      closeModal();
    });

    // Admin/Editor Toggle Switches
    const btnAdmin = document.getElementById('btn-admin');
    const btnEditor = document.getElementById('btn-editor');
    
    function updateAuthUI() {
      if (isAdmin) {
        btnAdmin.className = "px-3 py-1.5 rounded-md text-sm font-bold transition-colors bg-orange-500 text-white shadow";
        btnEditor.className = "px-3 py-1.5 rounded-md text-sm font-bold transition-colors text-gray-500 hover:bg-gray-200";
      } else {
        btnAdmin.className = "px-3 py-1.5 rounded-md text-sm font-bold transition-colors text-gray-500 hover:bg-gray-200";
        btnEditor.className = "px-3 py-1.5 rounded-md text-sm font-bold transition-colors bg-blue-500 text-white shadow";
      }
      renderList();
    }

    btnAdmin.addEventListener('click', () => { isAdmin = true; updateAuthUI(); });
    btnEditor.addEventListener('click', () => { isAdmin = false; updateAuthUI(); });

  </script>
</body>
</html>
