<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おかログ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-white shadow-sm border-b px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
    <!-- ロゴクリックでHOME（初期状態）に戻る -->

      <button id="btn-login-modal" class="px-3 py-1.5 rounded-md text-sm font-bold transition-colors bg-orange-500 text-white shadow hover:bg-orange-600">

  <!-- Main Content Area -->
  <main class="flex-1 flex flex-col lg:flex-row max-w-screen-2xl w-full mx-auto p-4 gap-4">
    
    <!-- Left Column: Filters & List -->
    <div class="w-full lg:w-1/2 flex flex-col gap-4">
      
      <!-- Controls -->
      <div class="bg-white p-4 rounded-xl shadow-sm border flex flex-col gap-3">
        <div class="flex flex-col sm:flex-row gap-3">
          <div class="flex-1">
            <label class="block text-xs font-semibold text-gray-500 mb-1">都道府県</label>
            <select id="filter-pref" class="w-full border-gray-300 rounded-lg shadow-sm p-2 bg-gray-50 focus:ring-orange-500 focus:border-orange-500 outline-none border">
              <option value="">すべての都道府県</option>
            </select>
          </div>
          <div class="flex-1">
            <label class="block text-xs font-semibold text-gray-500 mb-1">エリア</label>
            <select id="filter-area" class="w-full border-gray-300 rounded-lg shadow-sm p-2 bg-gray-50 focus:ring-orange-500 focus:border-orange-500 outline-none border">
              <option value="">すべてのエリア</option>
            </select>
          </div>
          <div class="flex-1">
            <label class="block text-xs font-semibold text-gray-500 mb-1">ジャンル</label>
            <select id="filter-genre" class="w-full border-gray-300 rounded-lg shadow-sm p-2 bg-gray-50 focus:ring-orange-500 focus:border-orange-500 outline-none border">
              <option value="">すべてのジャンル</option>
            </select>
          </div>
        </div>
        <div class="flex justify-end hidden" id="add-btn-container">
          <button id="btn-add" class="w-full sm:w-auto bg-gray-800 hover:bg-gray-900 text-white px-4 py-2 rounded-lg font-medium flex items-center justify-center gap-2 transition-colors">
            <i data-lucide="plus" class="w-5 h-5"></i> お店を追加
          </button>
        </div>
      </div>

      <!-- List -->
      <div class="bg-white rounded-xl shadow-sm border overflow-hidden flex-1 flex flex-col">
        <div class="p-4 border-b bg-gray-50/50 flex justify-between items-center">
          <h2 class="font-bold text-gray-700">登録店舗 (<span id="list-count">0</span>件)</h2>
          <span class="text-xs text-gray-500">リストを押すと地図が移動します</span>
        </div>
        <div class="overflow-y-auto max-h-[500px] lg:max-h-[calc(100vh-250px)] p-2">
          <div id="restaurant-list" class="flex flex-col gap-2">
            <!-- 読み込み中表示 -->
            <div class="text-center text-gray-400 py-10">読み込み中...</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Column: Map & Details -->
    <div class="w-full lg:w-1/2 flex flex-col gap-4">
      <div class="bg-white rounded-xl shadow-sm border overflow-hidden flex-1 min-h-[400px] lg:min-h-0 flex flex-col relative">
        <!-- Map Iframe -->
        <div class="flex-1 bg-gray-200 relative">
          <iframe id="map-frame" title="Google Maps" width="100%" height="100%" style="border: 0;" loading="lazy" allowfullscreen src="https://maps.google.com/maps?q=大阪&t=&z=11&ie=UTF8&iwloc=&output=embed"></iframe>
        </div>
        <!-- Address Details -->
        <div class="bg-white p-4 border-t flex items-start gap-3">
          <i data-lucide="map-pin" class="text-orange-500 mt-1 flex-shrink-0 w-6 h-6"></i>
          <div id="map-details" class="flex-1">
            <div class="text-gray-500 text-sm mt-1">リストからお店を選択すると、ここに詳細な地図が表示されます。</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Login Modal (合言葉入力画面) -->
  <div id="login-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden flex flex-col">
      <div class="px-6 py-4 border-b flex justify-between items-center bg-gray-50">
        <h2 class="font-bold text-lg text-gray-800">権限の切り替え</h2>

        </button>
      </div>
      <div class="p-6 flex flex-col gap-4">

          お店の追加や編集を行うには、管理者から教えられた「合言葉」を入力してください。

          <!-- 目玉アイコン -->
          <button type="button" id="btn-toggle-password" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-gray-700 transition-colors">
            <i data-lucide="eye" id="password-eye-icon" class="w-5 h-5"></i>
          </button>
          <p id="login-error" class="text-red-500 text-xs mt-1 hidden">合言葉が間違っています。</p>
        </div>
        <button id="btn-submit-login" class="w-full bg-orange-500 text-white font-bold py-2 rounded-md hover:bg-orange-600 transition-colors">
          ログイン
        </button>
        <hr class="my-2 border-gray-200">
        <!-- 暗号化されたメールリンク -->
        <a href="#" id="btn-request-mail" class="text-center text-sm text-blue-600 hover:underline flex items-center justify-center gap-1">
          <i data-lucide="mail" class="w-4 h-4"></i> 管理者に合言葉をリクエストする
        </a>
      </div>
    </div>
  </div>

  <!-- Form Modal (お店追加・編集画面) -->
  <div id="form-modal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
      <div class="px-6 py-4 border-b flex justify-between items-center bg-gray-50">
        <h2 id="form-title" class="font-bold text-lg text-gray-800">お店情報の編集</h2>
        <button id="btn-close-modal" class="text-gray-500 hover:bg-gray-200 p-1 rounded-full transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="p-6 overflow-y-auto flex-1">
        <form id="restaurant-form" class="flex flex-col gap-4">
          <input type="hidden" id="form-id">
          
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">店名 <span class="text-red-500">*</span></label>
            <input required type="text" id="form-name" class="w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50 focus:ring-2 focus:ring-orange-500 border outline-none" placeholder="例: カフェ・〇〇">
          </div>
          
          <div class="flex gap-4">
            <div class="flex-1">
              <label class="block text-sm font-medium text-gray-700 mb-1">ジャンル <span class="text-red-500">*</span></label>
              <!-- ▼ 麺類を細分化してジャンルを更新 ▼ -->
              <select required id="form-genre" class="w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50 focus:ring-2 focus:ring-orange-500 border outline-none">
                <option value="">選択してください</option>
                <option value="和食・定食">和食・定食</option>
                <option value="洋食・西洋料理">洋食・西洋料理</option>
                <option value="中華料理">中華料理</option>
                <option value="アジア・エスニック">アジア・エスニック</option>
                <option value="焼肉・ホルモン">焼肉・ホルモン</option>
                <option value="寿司・海鮮">寿司・海鮮</option>
                <option value="居酒屋・バー">居酒屋・バー</option>
                <option value="ラーメン">ラーメン</option>
                <option value="うどん">うどん</option>
                <option value="そば">そば</option>
                <option value="その他麺類">その他麺類</option>
                <option value="お好み焼き・粉もん">お好み焼き・粉もん</option>
                <option value="カレー">カレー</option>
                <option value="カフェ・スイーツ">カフェ・スイーツ</option>
                <option value="その他">その他</option>
              </select>
            </div>
            <div class="flex-1">
              <label class="block text-sm font-medium text-gray-700 mb-1">エリア (自動反映)</label>
              <!-- エリアは住所から自動反映されるためreadonly -->
              <input type="text" id="form-area" readonly class="w-full border-gray-200 rounded-md shadow-sm p-2 bg-gray-100 text-gray-500 border outline-none cursor-not-allowed" placeholder="住所を入れると反映されます">
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">住所 <span class="text-red-500">*</span></label>
            <input required type="text" id="form-address" class="w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50 focus:ring-2 focus:ring-orange-500 border outline-none" placeholder="例: 大阪府大阪市北区...">
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">URL (食べログや公式サイト)</label>
            <input type="url" id="form-url" class="w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50 focus:ring-2 focus:ring-orange-500 border outline-none" placeholder="https://...">
          </div>

          <div>
            <!-- 満足度を★で選択できるように変更 -->
            <label class="block text-sm font-medium text-gray-700 mb-2">満足度</label>
            <div class="flex gap-2 items-center">
              <div id="form-taste-container" class="flex gap-1">
                <button type="button" data-val="1" class="taste-star text-gray-300 hover:scale-110 transition-transform"><i data-lucide="star" class="w-8 h-8 pointer-events-none fill-current"></i></button>
                <button type="button" data-val="2" class="taste-star text-gray-300 hover:scale-110 transition-transform"><i data-lucide="star" class="w-8 h-8 pointer-events-none fill-current"></i></button>
                <button type="button" data-val="3" class="taste-star text-gray-300 hover:scale-110 transition-transform"><i data-lucide="star" class="w-8 h-8 pointer-events-none fill-current"></i></button>
                <button type="button" data-val="4" class="taste-star text-gray-300 hover:scale-110 transition-transform"><i data-lucide="star" class="w-8 h-8 pointer-events-none fill-current"></i></button>
                <button type="button" data-val="5" class="taste-star text-gray-300 hover:scale-110 transition-transform"><i data-lucide="star" class="w-8 h-8 pointer-events-none fill-current"></i></button>
              </div>
              <span id="taste-label" class="ml-2 text-sm text-gray-500 font-medium">未評価</span>
            </div>
            <input type="hidden" id="form-taste" value="0">
          </div>

          <div>
            <!-- おすすめのシーン（一人で追加） -->
            <label class="block text-sm font-medium text-gray-700 mb-2">おすすめのシーン（複数選択可）</label>
            <div class="flex flex-wrap gap-3">
              <label class="flex items-center gap-2 cursor-pointer bg-white border border-gray-300 px-3 py-2 rounded-md hover:bg-orange-50 transition-colors"><input type="checkbox" value="一人で" class="scene-cb w-4 h-4 text-orange-500 rounded border-gray-300 focus:ring-orange-500"> <span class="text-sm font-medium text-gray-700">一人で</span></label>
              <label class="flex items-center gap-2 cursor-pointer bg-white border border-gray-300 px-3 py-2 rounded-md hover:bg-orange-50 transition-colors"><input type="checkbox" value="デート" class="scene-cb w-4 h-4 text-orange-500 rounded border-gray-300 focus:ring-orange-500"> <span class="text-sm font-medium text-gray-700">デート</span></label>
              <label class="flex items-center gap-2 cursor-pointer bg-white border border-gray-300 px-3 py-2 rounded-md hover:bg-orange-50 transition-colors"><input type="checkbox" value="接待" class="scene-cb w-4 h-4 text-orange-500 rounded border-gray-300 focus:ring-orange-500"> <span class="text-sm font-medium text-gray-700">接待</span></label>
              <label class="flex items-center gap-2 cursor-pointer bg-white border border-gray-300 px-3 py-2 rounded-md hover:bg-orange-50 transition-colors"><input type="checkbox" value="大人数" class="scene-cb w-4 h-4 text-orange-500 rounded border-gray-300 focus:ring-orange-500"> <span class="text-sm font-medium text-gray-700">大人数</span></label>
              <label class="flex items-center gap-2 cursor-pointer bg-white border border-gray-300 px-3 py-2 rounded-md hover:bg-orange-50 transition-colors"><input type="checkbox" value="家族（子供と）" class="scene-cb w-4 h-4 text-orange-500 rounded border-gray-300 focus:ring-orange-500"> <span class="text-sm font-medium text-gray-700">家族（子供と）</span></label>
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">特徴・メモ</label>
            <textarea id="form-features" rows="3" class="w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50 focus:ring-2 focus:ring-orange-500 border outline-none" placeholder="おしゃれ、落ち着く、など"></textarea>
          </div>

          <div class="mt-4 flex gap-3 justify-end pt-4 border-t border-gray-100">
            <button type="button" id="btn-cancel" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 font-medium transition-colors">キャンセル</button>
            <button type="submit" class="px-6 py-2 bg-gray-800 text-white rounded-md hover:bg-gray-900 font-medium transition-colors shadow-sm">保存する</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- あなた専用の Firebase Config ---
    const firebaseConfig = {
      apiKey: "AIzaSyDCdW8mIOizhKt2FKf4vuyOZhRXIQxdmKc",
      authDomain: "okalogo-40bee.firebaseapp.com",
      projectId: "okalogo-40bee",
      storageBucket: "okalogo-40bee.firebasestorage.app",
      messagingSenderId: "38506015761",
      appId: "1:38506015761:web:2a2c16fab2e2ad913415b0",
      measurementId: "G-R130SM1LN5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // --- 権限管理 (難読化済みパスワード) ---
    const KEY_A = "b2thdGFrdTE5ODQ="; // 管理者: okataku1984
    const KEY_E = "b2thdGFrdUZyaWVuZA=="; // 編集者: okatakuFriend
    
    let currentRole = localStorage.getItem('okalogo_role') || 'viewer';

    // --- State ---
    let restaurants = [];
    let activeRestaurantId = null;
    let selectedPref = '';
    let selectedArea = '';
    let selectedGenre = '';

    lucide.createIcons();

    // --- DOM Elements ---
    const listEl = document.getElementById('restaurant-list');
    const filterPrefEl = document.getElementById('filter-pref');
    const filterAreaEl = document.getElementById('filter-area');
    const filterGenreEl = document.getElementById('filter-genre');
    const listCountEl = document.getElementById('list-count');
    const mapFrame = document.getElementById('map-frame');
    const mapDetails = document.getElementById('map-details');
    const modal = document.getElementById('form-modal');
    const form = document.getElementById('restaurant-form');
    
    // Login Elements
    const loginModal = document.getElementById('login-modal');
    const roleBadge = document.getElementById('current-role-badge');
    const btnLoginModal = document.getElementById('btn-login-modal');
    const btnLogout = document.getElementById('btn-logout');
    const addBtnContainer = document.getElementById('add-btn-container');

    // --- Authentication & Data Fetching ---
    const initAuth = async () => {
      try {
        await signInAnonymously(auth);
      } catch (error) {
        console.error("Auth Error:", error);
      }
    };
    initAuth();

    onAuthStateChanged(auth, (user) => {
      if (!user) return;
      const collRef = collection(db, 'restaurants');
      
      onSnapshot(collRef, (snapshot) => {
        if (!snapshot.empty) {
          restaurants = snapshot.docs.map(doc => {
            const data = doc.data();
            // ★エリア名の表記ゆれ（都道府県の有無）をなくすため、都道府県名をカットして統一
            let cleanArea = data.area || '';
            cleanArea = cleanArea.replace(/^(北海道|東京都|(?:京都|大阪)府|.{2,3}県)/, '');
            
            return { id: doc.id, pref: extractPrefecture(data.area), normalizedArea: cleanArea, ...data };
          });
          updateFiltersOptions();
          updateUIByRole();
          renderList();
        }
      }, (error) => {
        console.error("Firestore Error:", error);
      });
    });

    // --- Core Functions ---
    // 住所またはエリアから「都道府県」を抽出
    function extractPrefecture(area) {
      if (!area) return '';
      const match = area.match(/(北海道|東京都|(?:京都|大阪)府|.{2,3}県)/);
      if (match) return match[0];
      
      if (area.includes('大阪') || area.includes('堺市') || area.includes('池田市') || area.includes('豊中市') || area.includes('守口市') || area.includes('羽曳野市') || area.includes('大東市') || area.includes('泉佐野市') || area.includes('河内長野市')) return '大阪府';
      if (area.includes('兵庫') || area.includes('神戸市') || area.includes('西宮市') || area.includes('尼崎市') || area.includes('宝塚市') || area.includes('姫路市') || area.includes('伊丹市') || area.includes('三田市') || area.includes('加東市') || area.includes('丹波市') || area.includes('丹波篠山市')) return '兵庫県';
      if (area.includes('京都') || area.includes('宇治市') || area.includes('城陽市') || area.includes('福知山市')) return '京都府';
      if (area.includes('和歌山') || area.includes('紀の川市') || area.includes('東牟婁郡') || area.includes('有田郡')) return '和歌山県';

      return 'その他';
    }

    // 住所から「都道府県＋市区町村」を自動抽出（フォーム用）
    function extractAreaFromAddress(address) {
      if (!address) return '';
      const match = address.match(/^(.{2,3}?[都道府県])?(.+?[市区町村])/);
      if (match) {
        return (match[1] || '') + match[2]; // 例: 大阪府 + 大阪市
      }
      const spaceIndex = address.search(/[\s　]/);
      return spaceIndex > -1 ? address.substring(0, spaceIndex) : address;
    }

    // 住所入力時に自動でエリアをセットするイベント
    document.getElementById('form-address').addEventListener('input', (e) => {
      document.getElementById('form-area').value = extractAreaFromAddress(e.target.value);
    });

    // ★満足度の星を光らせる処理（色分け付き）
    const tasteStars = document.querySelectorAll('.taste-star');
    const tasteInput = document.getElementById('form-taste');
    const tasteLabel = document.getElementById('taste-label');

    function updateStars(val) {
      tasteInput.value = val;
      tasteLabel.textContent = val > 0 ? `星 ${val}` : '未評価';
      
      // 星の数に応じた色を設定（1:青, 2:緑, 3:黄, 4:オレンジ, 5:赤）
      const colors = ['text-gray-300', 'text-blue-500', 'text-green-500', 'text-yellow-500', 'text-orange-500', 'text-red-500'];
      const activeColor = colors[val] || 'text-gray-300';

      tasteStars.forEach(star => {
        const starVal = parseInt(star.dataset.val);
        star.classList.remove('text-gray-300', 'text-blue-500', 'text-green-500', 'text-yellow-500', 'text-orange-500', 'text-red-500');
        
        if (starVal <= val) {
          star.classList.add(activeColor);
        } else {
          star.classList.add('text-gray-300');
        }
      });
    }

    tasteStars.forEach(star => {
      star.addEventListener('click', (e) => {
        updateStars(parseInt(e.currentTarget.dataset.val));
      });
    });

    function updateFiltersOptions() {
      const prefs = [...new Set(restaurants.map(r => r.pref).filter(Boolean))].sort();
      let filteredForArea = restaurants;
      if (selectedPref) {
        filteredForArea = restaurants.filter(r => r.pref === selectedPref);
      }
      // 表記ゆれをなくした normalizedArea で選択肢を作成
      const areas = [...new Set(filteredForArea.map(r => r.normalizedArea).filter(Boolean))].sort();
      const genres = [...new Set(restaurants.map(r => r.genre).filter(Boolean))].sort();
      
      filterPrefEl.innerHTML = '<option value="">すべての都道府県</option>' + prefs.map(p => `<option value="${p}" ${p === selectedPref ? 'selected' : ''}>${p}</option>`).join('');
      filterAreaEl.innerHTML = '<option value="">すべてのエリア</option>' + areas.map(a => `<option value="${a}" ${a === selectedArea ? 'selected' : ''}>${a}</option>`).join('');
      filterGenreEl.innerHTML = '<option value="">すべてのジャンル</option>' + genres.map(g => `<option value="${g}" ${g === selectedGenre ? 'selected' : ''}>${g}</option>`).join('');
    }

    function updateUIByRole() {
      if (currentRole === 'admin') {
        roleBadge.textContent = '管理者モード';
        roleBadge.className = 'text-sm font-bold px-3 py-1.5 rounded-md bg-red-100 text-red-700 border border-red-200';
        btnLoginModal.classList.add('hidden');
        btnLogout.classList.remove('hidden');
        addBtnContainer.classList.remove('hidden');
      } else if (currentRole === 'editor') {
        roleBadge.textContent = '編集者モード';
        roleBadge.className = 'text-sm font-bold px-3 py-1.5 rounded-md bg-blue-100 text-blue-700 border border-blue-200';
        btnLoginModal.classList.add('hidden');
        btnLogout.classList.remove('hidden');
        addBtnContainer.classList.remove('hidden');
      } else {
        roleBadge.textContent = '閲覧モード';
        roleBadge.className = 'text-sm font-bold px-3 py-1.5 rounded-md bg-gray-200 text-gray-600';
        btnLoginModal.classList.remove('hidden');
        btnLogout.classList.add('hidden');
        addBtnContainer.classList.add('hidden');
      }
    }

    function renderList() {
      const filtered = restaurants.filter(r => {
        const matchPref = selectedPref ? r.pref === selectedPref : true;
        const matchArea = selectedArea ? r.normalizedArea === selectedArea : true; // normalizedAreaで判定
        const matchGenre = selectedGenre ? r.genre === selectedGenre : true;
        return matchPref && matchArea && matchGenre;
      });

      listCountEl.textContent = filtered.length;

      if (filtered.length === 0) {
        listEl.innerHTML = `
          <div class="text-center text-gray-400 py-10">
            <i data-lucide="search" class="mx-auto mb-2 opacity-50 w-8 h-8"></i>
            条件に合うお店がありません
          </div>`;
      } else {
        listEl.innerHTML = filtered.map(r => {
          const isActive = activeRestaurantId === r.id;
          const bgClass = isActive ? 'border-orange-500 bg-orange-50/50 ring-1 ring-orange-500' : 'border-gray-200 hover:border-orange-300 hover:bg-orange-50/20';
          
          let actionButtons = '';
          if (isActive && currentRole !== 'viewer') {
            let adminOrEditorBtns = '';
            if (currentRole === 'admin') {
              const deleteBtnText = r.deleteRequested ? '削除を承認' : '削除';
              adminOrEditorBtns += `<button class="btn-delete text-sm text-white bg-red-500 hover:bg-red-600 px-3 py-1.5 rounded-md flex items-center gap-1 shadow-sm"><i data-lucide="trash-2" class="w-4 h-4"></i> ${deleteBtnText}</button>`;
              if (r.deleteRequested) {
                adminOrEditorBtns += `<button class="btn-cancel-request text-sm text-gray-600 bg-white border border-gray-300 hover:bg-gray-50 px-3 py-1.5 rounded-md flex items-center gap-1 shadow-sm">依頼取消</button>`;
              }
            } else if (currentRole === 'editor') {
              if (!r.deleteRequested) {
                adminOrEditorBtns += `<button class="btn-request-delete text-sm text-red-600 bg-red-50 hover:bg-red-100 border border-red-200 px-3 py-1.5 rounded-md flex items-center gap-1 shadow-sm"><i data-lucide="alert-circle" class="w-4 h-4"></i> 削除を依頼</button>`;
              } else {
                adminOrEditorBtns += `<span class="text-sm text-gray-500 px-2 py-1.5 flex items-center gap-1"><i data-lucide="check-circle" class="text-green-500 w-4 h-4"></i> 依頼済</span>`;
              }
            }

            actionButtons = `
              <div class="mt-4 pt-3 border-t border-orange-200/50 flex flex-wrap gap-2 justify-end">
                <button class="btn-edit text-sm text-gray-600 bg-white border border-gray-300 hover:bg-gray-50 px-3 py-1.5 rounded-md flex items-center gap-1 shadow-sm"><i data-lucide="edit-2" class="w-4 h-4"></i> 編集</button>
                ${adminOrEditorBtns}
              </div>
            `;
          }

          let deleteBadge = r.deleteRequested && currentRole === 'admin' ? `<span class="bg-red-100 text-red-700 text-xs px-2 py-1 rounded-full font-bold flex items-center gap-1 border border-red-200"><i data-lucide="alert-circle" class="w-3 h-3"></i> 削除依頼あり</span>` : '';

          // 満足度を星アイコンと色で表示
          let starsHtml = '';
          const tasteNum = parseInt(r.taste);
          if (tasteNum > 0 && tasteNum <= 5) {
            let colorClass = '';
            let bgClass = '';
            if (tasteNum === 1) { colorClass = 'text-blue-500 fill-blue-500'; bgClass = 'bg-blue-50 text-blue-800 border-blue-200'; }
            else if (tasteNum === 2) { colorClass = 'text-green-500 fill-green-500'; bgClass = 'bg-green-50 text-green-800 border-green-200'; }
            else if (tasteNum === 3) { colorClass = 'text-yellow-500 fill-yellow-500'; bgClass = 'bg-yellow-50 text-yellow-800 border-yellow-200'; }
            else if (tasteNum === 4) { colorClass = 'text-orange-500 fill-orange-500'; bgClass = 'bg-orange-50 text-orange-800 border-orange-200'; }
            else if (tasteNum === 5) { colorClass = 'text-red-500 fill-red-500'; bgClass = 'bg-red-50 text-red-800 border-red-200'; }

            starsHtml = `<span class="${bgClass} text-xs px-2 py-1 rounded-md border font-medium flex items-center gap-1">満足度: <span class="flex">`;
            for(let i=0; i<tasteNum; i++) starsHtml += `<i data-lucide="star" class="w-3 h-3 ${colorClass}"></i>`;
            starsHtml += `</span></span>`;
          } else if (r.taste && r.taste !== "0") {
             starsHtml = `<span class="bg-gray-100 text-gray-800 text-xs px-2 py-1 rounded-md border border-gray-200 font-medium flex items-center gap-1">満足度: ${r.taste}</span>`;
          }

          // おすすめシーンをタグで表示
          let scenesHtml = '';
          if (r.scenes && r.scenes.length > 0) {
            scenesHtml = `<div class="flex flex-wrap gap-1 mt-2">`;
            r.scenes.forEach(scene => {
              scenesHtml += `<span class="bg-green-50 text-green-700 text-[11px] px-2 py-0.5 rounded border border-green-200"><i data-lucide="check-circle" class="inline w-3 h-3 mr-0.5"></i>${scene}</span>`;
            });
            scenesHtml += `</div>`;
          }

          // URLリンクとGoogle Mapリンクを店名の横に配置
          let urlLinkHtml = r.url ? `<a href="${r.url}" target="_blank" onclick="event.stopPropagation()" class="text-blue-600 hover:text-blue-800 text-xs font-medium flex items-center gap-1 bg-blue-50 px-2 py-1 rounded border border-blue-200 shadow-sm transition-colors"><i data-lucide="external-link" class="w-3 h-3"></i> 公式等</a>` : '';
          let mapLinkHtml = r.address ? `<a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.address)}" target="_blank" onclick="event.stopPropagation()" class="text-orange-600 hover:text-orange-800 text-xs font-medium flex items-center gap-1 bg-orange-50 px-2 py-1 rounded border border-orange-200 shadow-sm transition-colors"><i data-lucide="map-pin" class="w-3 h-3"></i> Map</a>` : '';

          return `
            <div class="restaurant-card p-4 rounded-lg border cursor-pointer transition-all ${bgClass}" data-id="${r.id}">
              <div class="flex justify-between items-start gap-2">
                <div class="flex flex-wrap items-center gap-2">
                  <h3 class="font-bold text-lg text-gray-800 leading-tight">${r.name}</h3>
                  <div class="flex items-center gap-1 mt-0.5">
                    ${mapLinkHtml}
                    ${urlLinkHtml}
                  </div>
                </div>
                <div class="flex items-center gap-1">${deleteBadge}</div>
              </div>
              <div class="flex flex-wrap gap-2 mt-2">
                ${r.genre ? `<span class="bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded-md">${r.genre}</span>` : ''}
                ${r.normalizedArea ? `<span class="bg-gray-100 text-gray-600 text-xs px-2 py-1 rounded-md">${r.normalizedArea}</span>` : ''}
                ${starsHtml}
              </div>
              ${scenesHtml}
              ${r.features ? `<p class="text-sm text-gray-600 mt-3 bg-gray-50 p-2 rounded border border-gray-100">${r.features}</p>` : ''}
              ${actionButtons}
            </div>
          `;
        }).join('');
      }
      lucide.createIcons();
    }

    function updateMap() {
      const activeRestaurant = restaurants.find(r => r.id === activeRestaurantId);
      const query = activeRestaurant ? activeRestaurant.address : (selectedArea || selectedPref || '大阪');
      const zoom = activeRestaurant ? 16 : 11;
      
      mapFrame.src = `https://maps.google.com/maps?q=${encodeURIComponent(query)}&t=&z=${zoom}&ie=UTF8&iwloc=&output=embed`;

      if (activeRestaurant) {
        // リンクをリスト側に移動したため、詳細パネルはスッキリと店名と住所のみに
        mapDetails.innerHTML = `
          <div class="flex flex-col gap-1">
            <h4 class="font-bold text-gray-800 text-lg">${activeRestaurant.name}</h4>
            <p class="text-gray-600 text-sm">${activeRestaurant.address}</p>
          </div>
        `;
      } else {
        mapDetails.innerHTML = `<div class="text-gray-500 text-sm mt-1">${selectedArea ? selectedArea + ' の地図を表示中' : 'リストからお店を選択すると、ここに詳細な地図が表示されます。'}</div>`;
      }
      lucide.createIcons();
    }

    // --- Modal Logic ---
    function openModal(data = null) {
      document.getElementById('form-title').textContent = data ? 'お店情報の編集' : '新しいお店の追加';
      document.getElementById('form-id').value = data?.id || '';
      document.getElementById('form-name').value = data?.name || '';
      document.getElementById('form-genre').value = data?.genre || '';
      document.getElementById('form-area').value = data?.area || '';
      document.getElementById('form-address').value = data?.address || '';
      document.getElementById('form-url').value = data?.url || '';
      document.getElementById('form-features').value = data?.features || '';
      
      // 星の復元
      updateStars(data?.taste ? parseInt(data.taste) : 0);

      // シーンの復元
      const sceneCbs = document.querySelectorAll('.scene-cb');
      const dataScenes = data?.scenes || [];
      sceneCbs.forEach(cb => {
        cb.checked = dataScenes.includes(cb.value);
        if(cb.checked) {
           cb.parentElement.classList.add('bg-orange-50', 'border-orange-500');
           cb.parentElement.classList.remove('bg-white', 'border-gray-300');
        } else {
           cb.parentElement.classList.remove('bg-orange-50', 'border-orange-500');
           cb.parentElement.classList.add('bg-white', 'border-gray-300');
        }
      });

      modal.classList.remove('hidden');
    }

    function closeModal() {
      modal.classList.add('hidden');
      form.reset();
      updateStars(0);
      const sceneCbs = document.querySelectorAll('.scene-cb');
      sceneCbs.forEach(cb => {
        cb.parentElement.classList.remove('bg-orange-50', 'border-orange-500');
        cb.parentElement.classList.add('bg-white', 'border-gray-300');
      });
    }

    // --- Event Listeners ---
    
    // Login System
    btnLoginModal.addEventListener('click', () => {
      document.getElementById('password-input').value = '';
      document.getElementById('password-input').setAttribute('type', 'password');
      document.getElementById('password-eye-icon').setAttribute('data-lucide', 'eye');
      lucide.createIcons();
      document.getElementById('login-error').classList.add('hidden');
      loginModal.classList.remove('hidden');
    });
    
    document.getElementById('btn-close-login').addEventListener('click', () => {
      loginModal.classList.add('hidden');
    });

    // パスワードの表示・非表示切り替え
    const togglePasswordBtn = document.getElementById('btn-toggle-password');
    const passwordInput = document.getElementById('password-input');
    const passwordEyeIcon = document.getElementById('password-eye-icon');

    togglePasswordBtn.addEventListener('click', () => {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      
      if (type === 'password') {
        passwordEyeIcon.setAttribute('data-lucide', 'eye');
      } else {
        passwordEyeIcon.setAttribute('data-lucide', 'eye-off');
      }
      lucide.createIcons(); // アイコンを再描画
    });

    document.getElementById('btn-submit-login').addEventListener('click', () => {
      const pwd = document.getElementById('password-input').value;
      const encodedPwd = btoa(pwd); // 入力されたパスワードをエンコードして比較
      
      if (encodedPwd === KEY_A) {
        currentRole = 'admin';
        localStorage.setItem('okalogo_role', 'admin');
        loginModal.classList.add('hidden');
        updateUIByRole();
        renderList();
      } else if (encodedPwd === KEY_E) {
        currentRole = 'editor';
        localStorage.setItem('okalogo_role', 'editor');
        loginModal.classList.add('hidden');
        updateUIByRole();
        renderList();
      } else {
        document.getElementById('login-error').classList.remove('hidden');
      }
    });

    // メールリクエストボタンの処理 (メアドをソースに直接書かないスパム対策)
    document.getElementById('btn-request-mail').addEventListener('click', (e) => {
      e.preventDefault();
      const m = atob('dGFrdXlhLm9rYXphd2FAZ21haWwuY29t');
      const s = encodeURIComponent('【おかログ】編集権限の申請');
      const b = encodeURIComponent('おかログにお店を追加したいです。\n編集用の合言葉を教えてください！');
      window.location.href = `mailto:${m}?subject=${s}&body=${b}`;
    });

    btnLogout.addEventListener('click', () => {
      currentRole = 'viewer';
      localStorage.removeItem('okalogo_role');
      activeRestaurantId = null;
      updateUIByRole();
      renderList();
      updateMap();
    });

    // HOMEボタン (ロゴクリックで初期状態に戻る)
    document.getElementById('btn-home').addEventListener('click', () => {
      selectedPref = '';
      selectedArea = '';
      selectedGenre = '';
      activeRestaurantId = null;
      
      filterPrefEl.value = '';
      filterAreaEl.value = '';
      filterGenreEl.value = '';
      
      updateFiltersOptions();
      renderList();
      updateMap();
    });

    // Filters & Add Button
    filterPrefEl.addEventListener('change', (e) => { 
      selectedPref = e.target.value; 
      selectedArea = ''; 
      activeRestaurantId = null; 
      updateFiltersOptions(); 
      renderList(); 
      updateMap(); 
    });
    filterAreaEl.addEventListener('change', (e) => { selectedArea = e.target.value; activeRestaurantId = null; renderList(); updateMap(); });
    filterGenreEl.addEventListener('change', (e) => { selectedGenre = e.target.value; activeRestaurantId = null; renderList(); updateMap(); });
    
    document.getElementById('btn-add').addEventListener('click', () => openModal());
    document.getElementById('btn-close-modal').addEventListener('click', closeModal);
    document.getElementById('btn-cancel').addEventListener('click', closeModal);

    // シーンのチェックボックスの見た目変更
    document.querySelectorAll('.scene-cb').forEach(cb => {
      cb.addEventListener('change', (e) => {
        if(e.target.checked) {
           e.target.parentElement.classList.add('bg-orange-50', 'border-orange-500');
           e.target.parentElement.classList.remove('bg-white', 'border-gray-300');
        } else {
           e.target.parentElement.classList.remove('bg-orange-50', 'border-orange-500');
           e.target.parentElement.classList.add('bg-white', 'border-gray-300');
        }
      });
    });

    // List Click Delegation
    listEl.addEventListener('click', async (e) => {
      const card = e.target.closest('.restaurant-card');
      if (!card) return;
      const id = card.dataset.id;
      const restaurant = restaurants.find(r => r.id === id);

      if (e.target.closest('.btn-edit')) {
        e.stopPropagation();
        openModal(restaurant);
      } else if (e.target.closest('.btn-delete')) {
        e.stopPropagation();
        if(confirm('本当に削除しますか？')) {
          await deleteDoc(doc(db, 'restaurants', id));
          if(activeRestaurantId === id) { activeRestaurantId = null; updateMap(); }
        }
      } else if (e.target.closest('.btn-request-delete')) {
        e.stopPropagation();
        if(confirm('管理者に削除を依頼しますか？')) {
          await updateDoc(doc(db, 'restaurants', id), { deleteRequested: true });
        }
      } else if (e.target.closest('.btn-cancel-request')) {
        e.stopPropagation();
        await updateDoc(doc(db, 'restaurants', id), { deleteRequested: false });
      } else {
        activeRestaurantId = id;
        renderList();
        updateMap();
      }
    });

    // Form Submit
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const sceneCbs = document.querySelectorAll('.scene-cb:checked');
      const scenes = Array.from(sceneCbs).map(cb => cb.value);

      const id = document.getElementById('form-id').value || crypto.randomUUID();
      const payload = {
        id,
        name: document.getElementById('form-name').value,
        genre: document.getElementById('form-genre').value,
        area: document.getElementById('form-area').value,
        address: document.getElementById('form-address').value,
        url: document.getElementById('form-url').value,
        features: document.getElementById('form-features').value,
        taste: document.getElementById('form-taste').value,
        scenes: scenes,
        updatedAt: new Date().toISOString()
      };
      
      await setDoc(doc(db, 'restaurants', id), payload, { merge: true });
      closeModal();
    });

  </script>
</body>
</html>
